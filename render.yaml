services:
  - type: web
    name: notes-website
    env: python
    region: singapore
    plan: free
    branch: main
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput
    startCommand: ./render_start.sh
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: false
      - key: ALLOWED_HOSTS
        value: "*"
      - key: DATABASE_URL
        fromDatabase:
          name: notes-db
          property: connectionString
      - key: WEB_CONCURRENCY
        value: 4
      - key: CLOUDINARY_CLOUD_NAME
        value: ''
      - key: CLOUDINARY_API_KEY
        value: ''
      - key: CLOUDINARY_API_SECRET
        value: ''

databases:
  - name: notes-db
    databaseName: notesdb
    user: notesuser
    plan: free
