{% extends 'base.html' %}
{% load static %}

{% block title %}Page not found · Notes{% endblock %}

{% block header %}
<header class="header" id="header">
  <div class="container">
    <a href="{% url 'index' %}" class="logo" aria-label="Notes Home">
      <i class="fas fa-graduation-cap"></i>
      <span>NOTES</span>
    </a>
    <nav class="navbar" id="navbar">
      <ul>
        <li><a href="{% url 'index' %}" class="nav-link">Home</a></li>
        <li><a href="{% url 'index' %}#contact" class="nav-link">Contact</a></li>
      </ul>
    </nav>
  </div>
</header>
{% endblock %}

{% block topics %}
<section class="error-section">
  <div class="container">
    <div class="error-content" data-aos="fade-up">
      <div class="error-icon"><i class="fas fa-compass"></i></div>
      <h1 class="error-code">404</h1>
      <h2 class="error-title">Page not found</h2>
      <p class="error-description">
        The page you're looking for doesn't exist or has been moved.
      </p>
      <a href="{% url 'index' %}" class="btn btn-primary">
        <i class="fas fa-home"></i> Back to home
      </a>
    </div>
  </div>
</section>
{% endblock topics %}
