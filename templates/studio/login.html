{% extends 'studio/base_studio.html' %}

{% block title %}Login{% endblock %}

{% block content %}
<div class="studio-card login-card">
  <h2><i class="fas fa-lock"></i> Studio Login</h2>
  <p style="color:#8a8a9a; font-size:.9rem; margin-top:-4px;">Private area — owner only.</p>

  {% if error %}
    <div class="msg error" style="background:#2a1418; color:#ffb4b8; border:1px solid #4a1a22; padding:10px 14px; border-radius:8px; margin-bottom:14px;">{{ error }}</div>
  {% endif %}

  <form method="post" class="studio-form">
    {% csrf_token %}
    <input type="hidden" name="next" value="{{ next }}" />
    <div class="form-row">
      <label for="username">Username</label>
      <input type="text" name="username" id="username" autofocus required />
    </div>
    <div class="form-row">
      <label for="password">Password</label>
      <input type="password" name="password" id="password" required />
    </div>
    <button type="submit" class="btn btn-primary">Log in</button>
  </form>
</div>
{% endblock %}
